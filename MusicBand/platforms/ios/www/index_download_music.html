


<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="format-detection" content="telephone=no" />
        <!-- WARNING: for iOS 7, remove the width=device-width and height=device-height attributes. See https://issues.apache.org/jira/browse/CB-4323 -->
        <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, target-densitydpi=device-dpi" />
        <link rel="stylesheet" type="text/css" href="css/index.css" />
        <title>Hello World</title>
    </head>
    
    <body>
        <div class="app">
            <h1>PhoneGap</h1>
            <div id="deviceready" class="blink">
                
            </div>
        </div>
      
          
      <script type="text/javascript" src="cordova.js"></script>
            
        <script type="text/javascript">
            document.addEventListener('deviceready', onDeviceReady, false);
            
            function downloadFile() {
                window.requestFileSystem(
                                         LocalFileSystem.PERSISTENT,
                                         0,
                                         onRequestFileSystemSuccess,
                                         fail
                                         );
            }
        
        function onRequestFileSystemSuccess(fileSystem) {
            console.log('onRequestFileSystemSuccess');
            fileSystem.root.getFile(
                                    'dummy.html',
                                    {create: true, exclusive: false},
                                    onGetFileSuccess,
                                    fail
                                    );
        }
        
        function onGetFileSuccess(fileEntry) {
            alert('onGetFileSuccess!');
            
            alert("fileEntry.toURL()"+fileEntry.toURL());
            var path = fileEntry.toURL().replace('dummy.html', '');
             alert("path==="+path);
            var fileTransfer = new FileTransfer();
            fileEntry.remove();
               fileTransfer.download(
                                     'http://www.w3schools.com/tags/horse.mp3',
                                     path + 'horse.mp3',
                                     function(file) {
                                     alert('download complete: ' + file.toURI());
                                     showLink(file.toURI());
                                     },
                                     function(error) {
                                     alert("error: "+JSON.stringify(error));
                                     console.log('download error source ' + error.source);
                                     console.log('download error target ' + error.target);
                                     console.log('upload error code: ' + error.code);
                                     }
                                     );
                                     
                                  
        }
        
        function showLink(url) {
            alert("showLink"+url);
            var divEl = document.getElementById('deviceready');
            var aElem = document.createElement('a');
            aElem.setAttribute('target', '_blank');
            aElem.setAttribute('href', url);
            aElem.appendChild(document.createTextNode('Ready! Click To Open.'))
            divEl.appendChild(aElem);
        }
        
        function fail(evt) {
            console.log(evt.target.error.code);
        }
        
        /* When this function is called, PhoneGap has been initialized and is ready to roll */
        function onDeviceReady() {
            console.log('device ready!');
            downloadFile();
        }
        </script>
    </body>
</html>
