<!doctype html>
<html>
<!-- Design by Asif H. Ansari Codeware Technologies -->
<!-- Basic Meta and Title -->
<head>
<meta charset="utf-8">
<meta content="initial-scale=1,maximum-scale=1,user-scalable=no" name="viewport">
<title>Home</title>
<link href="css/bootstrap.css" rel="stylesheet" type="text/css">
<link href="css/font-awesome.css" rel="stylesheet" type="text/css">
<link href="css/custom.css" rel="stylesheet" type="text/css">
</head>

<body>
<div class="container splsh_container">


<!--header start-->
    <header style="position: absolute;width: 100%;z-index: 1000;">
    	<div class="col-md-12" style="display: inline-block;padding: 0;width: 100%;">
        	<div class="col-xs-2" style="padding:4px 0 0 15px;">
            	<button type="button" class="btn btn-custom" onclick="backButton()"><span style="color:#fff;font-size:25px;"><i class="fa fa-angle-left"></i></span></button>
            </div>
            <div class="col-xs-7 heading_main">
            	<p>Tribe - Atlas</p>
            </div>
            <div class="col-xs-3" style="padding:5px 0 0 0;">
            	<div class="col-xs-6" style="padding-left:0;"><button type="button" class="btn btn-custom" onclick="onShare()"><span style="color:#fff;font-size:25px;"><i class="fa fa-share-square-o"></i></span></button></div>
                <div class="col-xs-6" style="padding-left:0;"><button type="button" class="btn btn-custom" onclick="homeButton()"><span style="color:#fff;font-size:25px;"><i class="fa fa-home"></i></span></button></div>
            </div>
        </div>
    </header>
    <!--header end-->
    
    
    <!--content start-->
     <div class="container" style="padding:0;height: 100%;min-height: 100%;min-width: 100%;position: absolute;">
     	<div class="col-md-12 first_srcreen" style="padding:0;background:url(images/background2_1.png)no-repeat scroll 0 0 / 100% 100% rgba(0, 0, 0, 0);height:50%;">
        	<div class="col-md-12" style="padding: 30% 0;">
           		<div class="col-xs-2"></div>
                <div class="col-xs-8">
                	<img width="100%" src="images/logo.png">
                </div>
                <div class="col-xs-2"></div>
            </div>
        </div>
        <div class="col-md-12 player_bottom" style="height: 50%;display: flex;padding: 0;position: absolute; width:100%;padding:0;background:url(images/background2_2.png)no-repeat scroll 0 0 / 100% 100% rgba(0, 0, 0, 0);">
        	<div class="col-md-12" style="display: inline-block;float: none;width: 100%;min-width: 100%;">
           		<p class="song_name_playing">Burn The Empire</p>
                <div class="col-md-12" style="display: inline-block;float: none;width: 100%;min-width: 100%;">
           		<img width="100%" src="images/song_status.png">
            </div>
            <div class="col-md-12" style="display: inline-block;float: none;width: 100%;min-width: 100%;">
           		<p class="song_name_playing" style="font-size:15px">Tribe - Atlas</p>
            </div>
            <div class="col-md-12" style="display: inline-block;float: none;width: 100%;min-width: 100%;">
            	<div class="col-xs-1"></div>
                <div class="col-xs-10">
                	<img width="100%" src="images/volume_control.png">
                </div>
                <div class="col-xs-1"></div>           		
            </div>
            <div class="col-md-12" style="display: inline-block;float: none;width: 100%;min-width: 100%;">
                <div class="col-xs-12 player_nav">
                	<div class="player_control">
                    	<button type="button" class="btn btn-custom_player"><span style="font-size:48px;"><img width="100%" src="images/backward_button.png"></span></button>
                    </div>
                    <div class="player_control2" style="padding:0;">
                    	<button type="button" class="btn btn-custom_player"><span style="font-size:52px;"><img width="100%" src="images/play_button.png"></span></button>                        	
                    </div>
                    <div class="player_control">
                    	<button type="button" class="btn btn-custom_player"><span style="font-size:48px;"><img width="100%" src="images/forward_button.png"></span></button>
                    </div>
                </div>       		
            </div>
            
            <div class="col-md-12" style="margin:7% 0 0;display:inline-block; width:100%;min-width: 100%;">
                	<div class="col-xs-3 text-center">
                    	<button type="button" class="btn btn-custom_player"><span style="color:#000;font-size:23px;"><i class="fa fa-refresh"></i></span></button>
                    </div>
                    <div class="col-xs-3 text-center">
                    	<button type="button" class="btn btn-custom_player"><span style="color:#000;font-size:23px;"><i class="fa fa-random"></i></span></button>                        	
                    </div>
                    <div class="col-xs-3 text-center">
                    	<button type="button" class="btn btn-custom_player" onclick="openLyrics()"><span style="color:#000;font-size:23px;"><i class="fa fa-list-ul"></i><span style="margin-left: 5px;font-size:14px;">Lyrics</span></span></button>
                    </div>
                    <div class="col-xs-3 text-center">
                    	<button type="button" class="btn btn-custom_player"><span style="color:#000;font-size:23px;"><i class="fa fa-info-circle"></i></span></button>
                    </div>   		
            </div>
            </div>
            
            
        </div>
     </div>  
     
        
    <!--content end-->
    
    
    <!--footer end-->

<!--footer end-->
</div>



<script type="text/javascript" src="js/jquery-1.10.2.min.js"></script>
<script type="text/javascript" src="js/bootstrap.js"></script>

<script type="text/javascript" charset="utf-8" src="pg-plugin-screen-orientation.js"></script>
   <script type="text/javascript" src="cordova.js"></script>
     <script type="text/javascript" src="js/SocialSharing.js"></script>
    
    
    <script type="text/javascript">
	
	document.addEventListener("deviceready", onDeviceReady, false);
		
	function onDeviceReady() {  
	
	navigator.screenOrientation.set('portrait');    
	} 
	function backButton()
	{
		window.location.href = 'music.html';    
	}
	function homeButton () {
	  window.location.href = 'home.html';     
	}
	
	function openLyrics () {
	  window.location.href = 'music_player_with_lyrics.html';     
	}
	
	function onShare()
{
	
    window.plugins.socialsharing.share('CodeWare Technologies ',
      null,
      null,
      'http://codewaretechnologies.com');  
            
}
  
</script>


  
</body>
<!-- Design by Asif H. Ansari Codeware Technologies -->
</html>
