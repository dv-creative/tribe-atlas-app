<!doctype html>
<html>
<!-- Design by Asif H. Ansari Codeware Technologies -->
<!-- Basic Meta and Title -->
<head>
<meta charset="utf-8">
<meta content="initial-scale=1,maximum-scale=1,user-scalable=no" name="viewport">
<title>Home</title>
<link href="css/bootstrap.css" rel="stylesheet" type="text/css">
<link href="css/font-awesome.css" rel="stylesheet" type="text/css">
<link href="css/custom.css" rel="stylesheet" type="text/css">
</head>

<body>
<div class="container splsh_container splsh_container2" style="display: table;">


<!--header start-->
    <header>
    	<div class="col-md-12" style="display: inline-block;padding: 0;width: 100%;">
        	<div class="col-xs-2" style="padding:4px 0 0 15px;">
            	<button type="button" class="btn btn-custom"><span style="color:#fff;font-size:25px;"><i class="fa fa-angle-left"></i></span></button>
            </div>
            <div class="col-xs-7 heading_main">
            	<p>Tribe - Atlas</p>
            </div>
            <div class="col-xs-3" style="padding:5px 0 0 0;">
            	<div class="col-xs-6" style="padding-left:0;"><button type="button" class="btn btn-custom"><span style="color:#fff;font-size:25px;"><i class="fa fa-share-square-o"></i></span></button></div>
                <div class="col-xs-6" style="padding-left:0;"><button type="button" class="btn btn-custom"><span style="color:#fff;font-size:25px;"><i class="fa fa-home"></i></span></button></div>
            </div>
        </div>
    </header>
    <!--header end-->
    
    
    <!--content start-->
     <div class="container" style="padding:0; top:45px;position:relative;">
        <div class="col-xs-12 miniplayer-img">
        	<img src="images/MusicPlayer-Mini.png">
        </div>  
     </div>  
     
        
    <!--content end-->
    
    
    <!--footer end-->
    <div class="col-xs-12 minified_player">
    	<div class="col-xs-2" style="padding:0;">
        	<div class="song_author_img">
            	<img width="100%" height="100%" src="images/img1.jpg">
            	<button class="btn btn-custom" type="button"><span style="color:#fff;"><img width="55%" src="images/window_icon2.png"></span></button>
            </div>
        </div> 
        <div class="col-xs-10 mini-player-bottom" style="padding:0;">
        	<div class="col-xs-4 play-btn-div">
            	<div class="music-play-btns">
                	<button type="button" class="btn play-btns-custom"><img src="images/backward_button.png"></button>
                </div>
                <div class="music-play-btns">
                	<button type="button" class="btn play-btns-custom"><img src="images/play_button.png"></button>
                </div>
                <div class="music-play-btns">
                	<button type="button" class="btn play-btns-custom"><img src="images/forward_button.png"></button>
                </div>
            </div>
            <div class="col-xs-8 burn-player-div">
            	<span class="burn-text">Burn The Empire</span>
                <div class="plyaer-time">
                	<img src="images/play_progressbar2.png">
                </div>
            </div>
        </div>
    </div>
<!--footer end-->
</div>



<script type="text/javascript" src="js/jquery-1.10.2.min.js"></script>
<script type="text/javascript" src="js/bootstrap.js"></script>
  <script type="text/javascript" charset="utf-8" src="pg-plugin-screen-orientation.js"></script>

     <script type="text/javascript" src="js/cordova-2.6.0.js"></script>
     <script type="text/javascript" src="js/SocialSharing.js"></script>
     
</body>

</html>
